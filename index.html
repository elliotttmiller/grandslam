<!doctype html>
<html lang="en">
  <head>
    <!-- Charset & Viewport -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5, user-scalable=yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- App Meta Tags -->
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Perfect Set – pick and track your tennis Grand Slam bracket. Compete in pools, earn upset bonuses, and chase the Calendar Slam." />
    <meta name="keywords" content="tennis, bracket, grand slam, sports, games, pools, competition" />
    
    <!-- iOS Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Perfect Set" />
    <meta name="apple-mobile-web-app-status-bar" content="black-translucent" />
    
    <!-- Android Web App -->
    <meta name="android-app-link-verification" content="true" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Perfect Set" />
    <meta property="og:description" content="Pick your Grand Slam tennis bracket, compete in pools, and track upsets." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/grandslam/perfect-set-logo.png" />
    <meta property="og:url" content="https://elliotttmiller.github.io/grandslam/" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Perfect Set" />
    <meta name="twitter:description" content="Pick your Grand Slam tennis bracket, compete in pools, and track upsets." />
    <meta name="twitter:image" content="/grandslam/perfect-set-logo.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/grandslam/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/grandslam/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/grandslam/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/grandslam/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/grandslam/apple-touch-icon.png" />
    
  <!-- Preload Critical Resources -->
  <!-- Removed missing font preload (/grandslam/fonts/system-ui.woff2) to avoid 404 on some hosts -->
    
    <!-- Performance & Security -->
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    
    <!-- Title -->
    <title>Perfect Set</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Mobile-First Optimizations & Safe Area Support -->
    <style>
      /* Safe area support for notched devices */
      @supports (padding: max(0px)) {
        html {
          padding-left: max(0px, env(safe-area-inset-left));
          padding-right: max(0px, env(safe-area-inset-right));
        }
      }
      
      /* Prevent default behaviors */
      body {
        overscroll-behavior: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        /* Smooth scrolling for iOS */
        -webkit-overflow-scrolling: touch;
      }
      
      /* Allow text selection in inputs */
      input, textarea, select {
        -webkit-user-select: text;
        user-select: text;
      }
      
      /* Disable rubber band scroll effect */
      html {
        overscroll-behavior-y: none;
      }
    </style>
    
    <!-- Service Worker Registration -->
    <script type="module">
      // Use a module script so `import.meta.env` is available after Vite build
      if ('serviceWorker' in navigator && import.meta.env?.PROD) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/grandslam/sw.js').catch(() => {
            // Service worker registration failed - app will still work in normal mode
          });
        });
      }
    </script>
  </body>
</html>
